# Tool categories for the router
# Git sub-categories use domain + priority for resolution
# Non-git categories are standalone (additive across domains)

categories:
  # --- Git sub-categories (domain: git) ---

  git_status:
    domain: git
    priority: 100
    keywords:
      - status
      - current state
    tools:
      - git_git_status

  git_diff:
    domain: git
    priority: 90
    keywords:
      - diff
      - show diff
      - view diff
      - see diff
      - show changes
      - view changes
      - unstaged
      - staged
    tools:
      - git_git_diff
      - git_git_diff_unstaged
      - git_git_diff_staged

  git_commit:
    domain: git
    priority: 80
    keywords:
      - commit this
      - commit changes
      - commit the
      - stage
      - add
    tools:
      - git_git_add
      - git_git_commit

  git_log:
    domain: git
    priority: 70
    keywords:
      - log
      - history
      - recent commits
    tools:
      - git_git_log
      - git_git_show

  git_branch:
    domain: git
    priority: 60
    keywords:
      - branch
      - branches
      - checkout
      - switch
      - create branch
    tools:
      - git_git_branch
      - git_git_create_branch
      - git_git_checkout

  git_full:
    domain: git
    priority: 50
    keywords:
      - reset
      - revert
    tools:
      - git_git_reset

  # Catch-all for ambiguous git queries (lowest priority in git domain)
  git_ambiguous:
    domain: git
    priority: 10
    keywords:
      - git
      - repository
      - repo
      - version control
    tools:
      - git_git_status
      - git_git_log
      - git_git_diff
      - git_git_commit
      - git_git_add
      - git_git_branch

  # --- Standalone categories (no domain, always additive) ---

  filesystem:
    keywords:
      - file
      - read
      - write
      - directory
      - folder
      - delete
      - move
      - copy
      - mkdir
      - list
      - search files
      - tree
      - edit
      - create
      - rename
      - open
      - save
      - path
    tools:
      - filesystem_read_file
      - filesystem_read_text_file
      - filesystem_read_media_file
      - filesystem_read_multiple_files
      - filesystem_write_file
      - filesystem_edit_file
      - filesystem_create_directory
      - filesystem_list_directory
      - filesystem_list_directory_with_sizes
      - filesystem_directory_tree
      - filesystem_move_file
      - filesystem_search_files
      - filesystem_get_file_info
      - filesystem_list_allowed_directories

  web:
    keywords:
      - search
      - find
      - lookup
      - url
      - fetch
      - scrape
      - browse
      - http
      - website
      - web
      - google
      - online
      - internet
    tools:
      - web_search
      - fetch_url

  code:
    keywords:
      - run
      - execute
      - python
      - bash
      - shell
      - compile
      - test
      - pip
      - install
      - script
      - code
      - calculator
      - math
      - calculate
      - program
    tools:
      - execute_python

  knowledge:
    keywords:
      - knowledge
      - notes
      - reference
      - document
      - learn
      - remember
      - save to knowledge
      - okf
      - note
      - journal
    tools:
      - read_knowledge
      - write_knowledge

# Fallback when no keywords match: "all" exposes every tool
fallback: all
